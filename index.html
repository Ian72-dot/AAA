<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Spotify</title>

<style>
body{
  margin:0;
  background:#121212;
  color:white;
  font-family:Arial,sans-serif;
}

header{
  background:#1DB954;
  padding:15px;
  font-size:24px;
  font-weight:bold;
}

.container{
  padding:20px;
}

.search{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#282828;
  color:white;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:8px;
  background:#1DB954;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

.results{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:#181818;
  padding:15px;
  border-radius:12px;
  transition:.2s;
}

.card:hover{
  background:#282828;
}

.card img{
  width:100%;
  border-radius:10px;
}

.title{
  margin-top:10px;
  font-weight:bold;
}

.artist{
  color:#aaa;
  font-size:14px;
}

audio{
  width:100%;
  margin-top:10px;
}
</style>
</head>
<body>

<header>Mini Spotify</header>

<div class="container">

  <div class="search">
    <input id="query" placeholder="Search tracks...">
    <button onclick="search()">Search</button>
  </div>

  <div class="results" id="results"></div>

</div>

<script>

const TOKEN = "YOUR_SPOTIFY_ACCESS_TOKEN";

async function search(){

  const q = document.getElementById("query").value;

  const res = await fetch(
    `https://api.spotify.com/v1/search?q=${encodeURIComponent(q)}&type=track&limit=12`,
    {
      headers:{
        Authorization:`Bearer ${TOKEN}`
      }
    }
  );

  const data = await res.json();

  const results = document.getElementById("results");

  results.innerHTML = "";

  data.tracks.items.forEach(track=>{

    results.innerHTML += `
      <div class="card">

        <img src="${track.album.images[0].url}">

        <div class="title">${track.name}</div>

        <div class="artist">
          ${track.artists.map(a=>a.name).join(", ")}
        </div>

        ${
          track.preview_url
          ? `<audio controls src="${track.preview_url}"></audio>`
          : `<p>No preview available</p>`
        }

      </div>
    `;
  });
}

</script>

</body>
</html>
