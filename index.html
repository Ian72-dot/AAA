<!DOCTYPE html>
<html>
<head>
  <title>Mini Reddit</title>
</head>

<body>

<input id="query" placeholder="r/cool or cool">
<button onclick="search()">Search</button>

<div id="posts"></div>
<div id="comments"></div>

<script>
// 👇 MUST be inside script tags

async function search(){

  let q = document.getElementById("query").value.trim();
  const postsDiv = document.getElementById("posts");
  const commentsDiv = document.getElementById("comments");

  postsDiv.innerHTML = "Loading...";
  commentsDiv.innerHTML = "";

  if(!q){
    postsDiv.innerHTML = "Type something like r/cool or cool";
    return;
  }

  q = q.toLowerCase();
  q = q.replace("https://www.reddit.com/r/", "");
  q = q.replace("http://www.reddit.com/r/", "");

  if(q.startsWith("r/")){
    q = q.slice(2);
  }

  try{

    const res = await fetch(`https://www.reddit.com/r/${q}.json`);

    if(!res.ok){
      throw new Error("Subreddit not found");
    }

    const data = await res.json();

    const posts = data.data.children;

    postsDiv.innerHTML = "";

    posts.forEach(p => {
      const post = p.data;

      postsDiv.innerHTML += `
        <div onclick="loadPost('${post.permalink}')">
          <b>${post.title}</b><br>
          👍 ${post.ups}
          <hr>
        </div>
      `;
    });

  } catch(err){
    postsDiv.innerHTML = err.message;
  }
}

async function loadPost(permalink){

  const commentsDiv = document.getElementById("comments");
  commentsDiv.innerHTML = "Loading comments...";

  const res = await fetch(`https://www.reddit.com${permalink}.json`);
  const data = await res.json();

  const post = data[0].data.children[0].data;
  const comments = data[1].data.children;

  commentsDiv.innerHTML = `<h2>${post.title}</h2><hr>`;

  comments.forEach(c => {
    if(c.data && c.data.body){
      commentsDiv.innerHTML += `
        <div>
          <b>u/${c.data.author}</b><br>
          ${c.data.body}
        </div><hr>
      `;
    }
  });
}

</script>

</body>
</html>
