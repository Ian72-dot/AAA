<!DOCTYPE html>
<html>
<head>
  <title>Mini Reddit (Node)</title>
  <style>
    body { font-family: Arial; background:#111; color:white; }
    input, button { padding:10px; margin:5px; }
    .post { padding:10px; border-bottom:1px solid #333; cursor:pointer; }
  </style>
</head>
<body>

<h2>Mini Reddit</h2>

<input id="sub" placeholder="r/cool or cool">
<button onclick="loadSub()">Search</button>

<div id="posts"></div>
<div id="comments"></div>

<script>

const API = "http://localhost:3000/api";

async function loadSub(){

  let q = document.getElementById("sub").value;

  q = q.replace("r/", "").trim();

  const res = await fetch(`${API}/sub/${q}`);
  const data = await res.json();

  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "";

  data.data.children.forEach(p => {

    const post = p.data;

    postsDiv.innerHTML += `
      <div class="post" onclick="loadPost('${post.permalink}')">
        <b>${post.title}</b><br>
        👍 ${post.ups}
      </div>
    `;
  });
}

async function loadPost(permalink){

  const res = await fetch(`${API}/post?url=${permalink}`);
  const data = await res.json();

  const post = data[0].data.children[0].data;
  const comments = data[1].data.children;

  const commentsDiv = document.getElementById("comments");

  commentsDiv.innerHTML = `
    <h3>${post.title}</h3>
    <hr>
  `;

  comments.forEach(c => {
    if(c.data && c.data.body){
      commentsDiv.innerHTML += `
        <p><b>u/${c.data.author}</b><br>${c.data.body}</p><hr>
      `;
    }
  });
}

</script>

</body>
</html>
